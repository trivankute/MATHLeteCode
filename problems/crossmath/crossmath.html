<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crossmath Challenge - MAT</title>
    <link rel="stylesheet" href="../../css/crossmath.css">
    <script src="../../js/crossmath.js"></script>
</head>

<body>

    <header>
        <a href="../../index.html" class="back-link">&larr; Back to Dashboard</a>
        <h1>Crossmath Challenge</h1>
        <div class="rules-note">
            <strong>Rules:</strong><br>
            1. Use each digit from <strong>1 to 9 exactly once</strong> (No duplicates).<br>
            2. Operations are evaluated strictly from <strong>left-to-right</strong> and <strong>top-to-bottom</strong>
            (Ignore standard operator precedence / BODMAS).
        </div>
    </header>

    <main>
        <!-- Lưới 7x7 tái hiện chính xác cấu trúc đề bài trên bảng -->
        <div id="feedback" class="feedback-message-hidden"></div>
        <div class="grid-container">
            <input type="number" id="cell-1-1" class="grid-input" min="1" max="9" placeholder="?">
            <span class="operator"></span>
            <input type="number" id="cell-1-3" class="grid-input" min="1" max="9" placeholder="?">
            <span class="operator"></span>
            <input type="number" id="cell-1-5" class="grid-input" min="1" max="9" placeholder="?">
            <span class="equals">=</span>
            <span class="target-result"></span>

            <!-- Row 2: Toán tử hàng dọc bên dưới ô số -->
            <span class="operator"></span>
            <span></span> <!-- Ô trống tạo khoảng cách -->
            <span class="operator"></span>
            <span></span>
            <span class="operator"></span>
            <span></span>
            <span></span>

            <input type="number" id="cell-3-1" class="grid-input" min="1" max="9" placeholder="?">
            <span class="operator"></span>
            <input type="number" id="cell-3-3" class="grid-input" min="1" max="9" placeholder="?">
            <span class="operator"></span>
            <input type="number" id="cell-3-5" class="grid-input" min="1" max="9" placeholder="?">
            <span class="equals">=</span>
            <span class="target-result"></span>

            <span class="operator"></span>
            <span></span>
            <span class="operator"></span>
            <span></span>
            <span class="operator"></span>
            <span></span>
            <span></span>

            <input type="number" id="cell-5-1" class="grid-input" min="1" max="9" placeholder="?">
            <span class="operator"></span>
            <input type="number" id="cell-5-3" class="grid-input" min="1" max="9" placeholder="?">
            <span class="operator"></span>
            <input type="number" id="cell-5-5" class="grid-input" min="1" max="9" placeholder="?">
            <span class="equals">=</span>
            <span class="target-result"></span>

            <span class="equals">=</span>
            <span></span>
            <span class="equals">=</span>
            <span></span>
            <span class="equals">=</span>
            <span></span>
            <span></span>

            <span class="target-result"></span>
            <span></span>
            <span class="target-result"></span>
            <span></span>
            <span class="target-result"></span>
            <span></span>
            <span></span>
        </div>

        <!-- those controls must be on the same line -->
        <div style="display: flex; justify-content: center; gap: 10px;" class="controls">
            <button class="btn-check" onclick="validatePuzzle()">Verify Solution</button>
            <!-- <button class="btn-check" onclick="showSolutions()">Show Solutions</button> -->
        </div>
    </main>
</body>

</html>
